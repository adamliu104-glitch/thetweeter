# render.yaml — Render Blueprint (Infrastructure as Code).
#
# In the Render dashboard: New +  ->  Blueprint  ->  pick this repository.
# Render reads this file and creates BOTH a web service and a PostgreSQL
# database, already connected to each other. No manual wiring needed.
#
# Blueprint reference: https://render.com/docs/blueprint-spec

databases:
  - name: thetweeter-db
    databaseName: boontweet # the database name INSIDE Postgres (matches local dev)
    user: boontweet
    plan: free # free tier is fine for a class project (note: free DBs expire after ~30 days)
    region: oregon # MUST match the web service's region below

services:
  - type: web
    name: thetweeter
    runtime: node
    plan: free
    region: oregon # same region as the database -> fast, private networking
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: / # Render pings this path to confirm the app is healthy
    envVars:
      # DATABASE_URL is filled in automatically from the database defined above.
      - key: DATABASE_URL
        fromDatabase:
          name: thetweeter-db
          property: connectionString
      # A long random secret for signing login-session cookies, generated by Render.
      - key: SESSION_SECRET
        generateValue: true
      # NOTE: PORT is provided by Render automatically; the app already reads it.
