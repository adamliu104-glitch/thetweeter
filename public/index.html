<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TheTweeter</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Top bar: app name (also the "home" link) + the logged-in user area. -->
    <header class="topbar">
      <!-- App name + a blue bird. The bird is an inline SVG so it scales
           crisply, needs no extra download, and inherits the logo's blue
           color via fill="currentColor". -->
      <h1 class="logo" id="home-link">
        <svg class="logo-bird" viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
          <path fill="currentColor" d="M23.643 4.937c-.835.37-1.732.62-2.675.733.962-.576 1.7-1.49 2.048-2.578-.9.534-1.897.922-2.958 1.13-.85-.904-2.06-1.47-3.4-1.47-2.572 0-4.658 2.086-4.658 4.66 0 .364.042.718.12 1.06-3.873-.195-7.304-2.05-9.602-4.868-.4.69-.63 1.49-.63 2.342 0 1.616.823 3.043 2.072 3.878-.764-.025-1.482-.234-2.11-.583v.06c0 2.257 1.605 4.14 3.737 4.568-.392.106-.803.162-1.227.162-.3 0-.593-.028-.877-.082.593 1.85 2.313 3.198 4.352 3.234-1.595 1.25-3.604 1.995-5.786 1.995-.376 0-.747-.022-1.112-.065 2.062 1.323 4.51 2.093 7.14 2.093 8.57 0 13.255-7.098 13.255-13.254 0-.2-.005-.402-.014-.602.91-.658 1.7-1.477 2.323-2.41z"/>
        </svg>
        <span>TheTweeter</span>
      </h1>
      <!-- Filled in by app.js: shows "@you  Log out" when logged in. -->
      <div class="user-area" id="user-area"></div>
    </header>

    <main class="container">
      <!-- LOGGED-OUT view: a single form that can either log in or sign up. -->
      <section class="auth-panel" id="auth-panel">
        <h2>Welcome to BoonTweet</h2>
        <p class="muted">
          Log in, or pick a username and password to create a new account.
        </p>
        <form class="auth-form" id="auth-form">
          <input
            id="auth-username"
            type="text"
            placeholder="username"
            autocomplete="username"
          />
          <input
            id="auth-password"
            type="password"
            placeholder="password"
            autocomplete="current-password"
          />
          <div class="auth-buttons">
            <button type="submit" id="login-btn">Log in</button>
            <button type="button" id="signup-btn" class="secondary">Sign up</button>
          </div>
        </form>
        <p class="error" id="auth-error"></p>
      </section>

      <!-- LOGGED-IN view: the compose box. Hidden until you log in. -->
      <section class="compose hidden" id="compose">
        <textarea
          id="tweet-input"
          maxlength="280"
          placeholder="What's happening?"
        ></textarea>
        <div class="compose-footer">
          <!-- Shows how many characters are left (counts down from 280). -->
          <span class="char-count" id="char-count">280</span>
          <button id="post-button">Tweet</button>
        </div>
      </section>

      <!-- Shown only when viewing a profile (e.g. after clicking a @username). -->
      <a href="#" class="back-home hidden" id="back-home">← Back to feed</a>
      <section class="profile-header hidden" id="profile-header"></section>

      <!-- The feed (or a profile's tweets) is rendered here by app.js. -->
      <section class="feed" id="feed"></section>
    </main>

    <!-- A small banner used for quick success/error messages. -->
    <div class="banner hidden" id="banner"></div>

    <script src="app.js"></script>
  </body>
</html>
